<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5DC3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a3a8a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Back tab (left) -->
  <rect x="16" y="28" width="70" height="52" rx="8" ry="8"
        fill="#E8F0FE" stroke="#2C5DC3" stroke-width="2.5"/>
  <circle cx="32" cy="44" r="5" fill="#2C5DC3"/>
  <rect x="44" y="42" width="30" height="4" rx="2" fill="#2C5DC3" opacity="0.4"/>

  <!-- Back tab (right) -->
  <rect x="26" y="38" width="70" height="52" rx="8" ry="8"
        fill="#D0E2FD" stroke="#2C5DC3" stroke-width="2.5"/>
  <circle cx="42" cy="54" r="5" fill="#2C5DC3"/>
  <rect x="54" y="52" width="30" height="4" rx="2" fill="#2C5DC3" opacity="0.4"/>

  <!-- Front tab (main) -->
  <rect x="36" y="48" width="70" height="52" rx="8" ry="8"
        fill="url(#bg)" stroke="#2C5DC3" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="52" cy="64" r="6" fill="white"/>
  <rect x="66" y="62" width="28" height="5" rx="2.5" fill="white" opacity="0.6"/>
  <rect x="66" y="72" width="20" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>